<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CAJA LOS ANDES · Informe Resultados CicloRecreoVía</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0c7480; --bg-card:#0a4e56; --bg-card2:#083f46; --border:rgba(255,255,255,.1);
    --text:#ffffff; --text-dim:rgba(255,255,255,.72);
    --orange:#f97316; --orange-dim:rgba(249,115,22,.18);
    --teal:#ffd166; --teal-dim:rgba(255,209,102,.15);
  }
  *{box-sizing:border-box;}
  html{ scroll-behavior:smooth; }
  body{ margin:0; font-family:'Nunito',sans-serif; background:var(--bg); color:var(--text); }
  .topbar, main{ position:relative; z-index:1; }
  .topbar{ z-index:50; }

  .topbar{
    padding:16px 20px 12px;
    display:flex; flex-direction:column; align-items:center; text-align:center; gap:2px;
  }
  .brand-title{
    font-weight:900; font-size:clamp(12px,4.2vw,21px); color:var(--text); letter-spacing:.2px;
    line-height:1.2; white-space:nowrap; display:flex; align-items:center; gap:8px;
  }
  .live-dot{ width:8px; height:8px; border-radius:50%; background:var(--orange); flex-shrink:0; animation:pulse 1.8s infinite; }
  @keyframes pulse{ 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.4;transform:scale(.8)} }
  .brand-sub{ font-weight:800; font-size:clamp(22px,4.4vw,28px); color:var(--text-dim); letter-spacing:3px; margin-top:2px; }
  .topbar-actions{ display:flex; gap:6px; margin-top:10px; flex-wrap:nowrap; justify-content:center; width:100%; }
  .filtro-wrap{ position:relative; }
  .filtro-btn{
    background:var(--bg-card); color:var(--text); border:1.5px solid var(--border); border-radius:999px;
    padding:8px 14px; font-family:'Nunito',sans-serif; font-weight:800; font-size:clamp(14px,4vw,26px); cursor:pointer;
    text-decoration:none; display:inline-block; line-height:1.2; white-space:nowrap;
  }
  .filtro-panel{
    display:none; position:fixed; left:50%; transform:translateX(-50%);
    background:var(--bg-card); border:1.5px solid var(--border); border-radius:14px;
    max-height:60vh; overflow-y:auto; width:min(92vw,320px); z-index:999;
    padding:6px; text-align:left; box-shadow:0 8px 24px rgba(0,0,0,.4);
  }
  .filtro-panel.open{ display:block; }
  .filtro-group-label{ font-size:11px; font-weight:800; color:var(--text-dim); text-transform:uppercase; letter-spacing:.5px; padding:8px 10px 3px; }
  .filtro-opt{
    display:block; width:100%; background:none; border:none; color:var(--text); text-align:left;
    padding:8px 10px; font-family:'Nunito',sans-serif; font-weight:700; font-size:15px; cursor:pointer;
    border-radius:8px; line-height:1.3;
  }
  .filtro-opt:hover, .filtro-opt:active{ background:var(--bg-card2); }
  .status{ font-size:11px; color:var(--text-dim); text-align:center; padding:4px 20px 0; min-height:14px; position:relative; z-index:1; }

  main{ max-width:1000px; margin:0 auto; padding:8px 14px 40px; }

  .section-header{ margin:24px 0 10px; scroll-margin-top:14px; }
  .section-header .eyebrow{ color:var(--orange); font-weight:800; font-size:11px; letter-spacing:1.5px; text-transform:uppercase; }
  .section-header .title{ font-weight:900; font-size:clamp(18px,2.8vw,24px); margin-top:2px; }
  .section-header .sub{ color:var(--text-dim); font-weight:600; font-size:12px; margin-top:2px; }

  /* --- Diapositiva (consolidado y domingos) --- */
  .slide{
    background:var(--bg-card); border:1px solid var(--border); border-radius:18px;
    padding:16px 16px; scroll-margin-top:14px; transition:box-shadow .3s, border-color .3s;
  }
  .slide + .slide{ margin-top:10px; }
  .slide.highlight{ border-color:var(--teal); box-shadow:0 0 0 4px rgba(255,209,102,.25); }

  .slide-eyebrow{ color:var(--orange); font-weight:800; font-size:11px; letter-spacing:1.5px; text-transform:uppercase; }
  .slide-title{ font-weight:900; font-size:clamp(18px,3.2vw,24px); margin:4px 0 0; line-height:1.15; }
  .slide-sub{ color:var(--text-dim); font-weight:600; font-size:12px; margin-top:3px; }

  .hero-number{
    display:flex; align-items:baseline; gap:12px; margin:10px 0 12px;
    padding:12px 16px; background:linear-gradient(135deg, var(--orange-dim), transparent);
    border:1px solid var(--border); border-left:4px solid var(--orange); border-radius:14px;
  }
  .hero-number .num{ font-size:clamp(28px,5vw,42px); font-weight:900; color:var(--orange); line-height:1; }
  .hero-number .lbl{ color:var(--text-dim); font-weight:700; font-size:11px; text-transform:uppercase; letter-spacing:.5px; }

  .stat-grid{ display:grid; grid-template-columns:repeat(auto-fit, minmax(140px,1fr)); gap:8px; margin-bottom:4px; }
  .stat-card{
    background:var(--bg-card2); border:1px solid var(--border); border-radius:12px; padding:10px 12px;
    display:flex; flex-direction:column; gap:3px;
  }
  .stat-card svg{ width:16px; height:16px; }
  .stat-card .val{ font-size:20px; font-weight:900; color:var(--text); }
  .stat-card .lbl{ font-size:10.5px; color:var(--text-dim); font-weight:700; }
  .stat-card.teal{ border-left:3px solid var(--teal); }
  .stat-card.orange{ border-left:3px solid var(--orange); }

  .split-row{ display:flex; gap:8px; margin:10px 0 2px; }
  .split-bar{ flex:1; background:var(--bg-card2); border:1px solid var(--border); border-radius:12px; padding:10px; }
  .split-bar .top{ display:flex; justify-content:space-between; font-size:11px; font-weight:700; color:var(--text-dim); margin-bottom:6px; }
  .split-track{ height:8px; border-radius:6px; background:rgba(0,0,0,.25); overflow:hidden; }
  .split-fill-p{ background:var(--orange); height:100%; }
  .split-fill-n{ background:var(--teal); height:100%; }

  .photo-box{
    border-radius:14px; overflow:hidden; border:1px solid var(--border); margin-top:10px;
    background:var(--bg-card2); display:flex; align-items:center; justify-content:center;
    aspect-ratio:16/9;
  }
  .photo-box img{ width:100%; height:100%; object-fit:cover; display:block; }
  .photo-box .empty{ color:var(--text-dim); font-size:12px; font-weight:700; text-align:center; padding:0 20px; }

  /* --- Nuevo layout de TOTAL --- */
  .total-label{ font-weight:900; font-size:clamp(26px,6vw,40px); color:var(--orange); letter-spacing:1px; text-align:center; text-transform:uppercase; }
  .total-sub{ color:var(--text-dim); font-weight:700; font-size:24px; text-align:center; margin-top:2px; margin-bottom:4px; }
  .group-title{ font-weight:900; font-size:clamp(22px,3.75vw,29px); text-align:center; letter-spacing:1.5px; margin:14px 0 8px; color:var(--text); }

  .trio-grid{ display:grid; grid-template-columns:repeat(3,1fr); gap:8px; margin:4px 0 2px; text-align:center; }
  .trio-box{
    background:#12626d; border-radius:12px; padding:10px 6px;
    display:flex; flex-direction:column; align-items:center;
  }
  .trio-label{ font-size:10.5px; font-weight:800; color:var(--text-dim); text-transform:uppercase; letter-spacing:.4px; margin-bottom:2px; }
  .trio-value{ font-size:clamp(26px,9vw,42px); font-weight:900; color:var(--text); line-height:1; }
  .trio-avg{ font-size:clamp(16px,3.6vw,20px); font-weight:800; color:var(--text-dim); margin-top:2px; line-height:1; white-space:nowrap; }

  /* Caja "Total" invertida: fondo blanco, texto con los colores que son fondo en el resto del dashboard */
  .trio-box-invert{ background:#ffffff; }
  .trio-box-invert .trio-label{ color:rgba(8,63,70,.6); }
  .trio-box-invert .trio-value{ color:var(--bg-card2); }
  .trio-box-invert .trio-avg{ color:rgba(8,63,70,.62); }

  .service-grid{ display:grid; grid-template-columns:repeat(3,1fr); gap:8px; margin:20px 0 18px; }
  .service-box{ background:#0a3b42; border:1px solid var(--border); border-radius:12px; padding:10px 6px; text-align:center; }
  .service-box .s-label{ font-size:9.5px; font-weight:800; color:var(--text-dim); text-transform:uppercase; letter-spacing:.3px; margin-bottom:5px; line-height:1.25; }
  .service-box .s-total{ font-size:clamp(27px,7.5vw,39px); font-weight:900; color:var(--teal); line-height:1; }
  .service-box .s-avg{ font-size:15px; font-weight:700; color:var(--text-dim); margin-top:4px; white-space:nowrap; }

  .afiliados-row{ display:flex; align-items:flex-start; justify-content:space-between; padding:2px 4px 2px; gap:12px; }
  .af-col{ display:flex; flex-direction:column; }
  .af-col-left{ align-items:center; text-align:center; }
  .af-col-right{ align-items:flex-end; }
  .af-label{ font-size:10.5px; font-weight:800; color:var(--text-dim); letter-spacing:.4px; margin-bottom:3px; }
  .af-col-left .af-label{ text-transform:uppercase; }
  .af-main{ font-size:clamp(26px,9vw,42px); font-weight:900; color:var(--teal); line-height:1; }
  .af-avg{ font-size:clamp(16px,3.6vw,20px); font-weight:800; color:var(--text-dim); margin-top:2px; line-height:1; white-space:nowrap; }
  .af-secondary{ font-size:clamp(24px,4.8vw,33px); font-weight:800; color:var(--text-dim); line-height:1; }

  .week-badge{
    display:inline-block; background:var(--teal-dim); color:var(--teal); font-weight:800; font-size:10.5px;
    padding:3px 9px; border-radius:20px; letter-spacing:.4px; margin-bottom:5px;
  }

  .empty-state{ display:flex; flex-direction:column; align-items:center; justify-content:center; gap:6px; color:var(--text-dim); text-align:center; padding:30px 20px; }
  .empty-state .big{ font-size:32px; }

  .graf-block{ margin-top:18px; }
  .graf-block + .graf-block{ margin-top:20px; }
  .graf-title{ font-size:16px; font-weight:800; color:var(--text); text-align:center; margin-bottom:10px; letter-spacing:.3px; }
  .graf-title .graf-pct{ font-weight:800; }
  .graf-title .graf-pct.pos{ color:var(--teal); }
  .graf-title .graf-pct.neg{ color:var(--orange); }
  .graf-row{ display:flex; align-items:center; gap:8px; margin-bottom:8px; }
  .graf-label{ width:48px; flex-shrink:0; font-size:15px; font-weight:800; color:var(--text-dim); }
  .graf-label.graf-label-real{ color:var(--teal); }
  .graf-track{ flex:1; height:16px; border-radius:8px; background:rgba(0,0,0,.28); overflow:hidden; }
  .graf-fill{ height:100%; border-radius:8px; transition:width .4s; }
  .graf-fill-meta{ background:var(--text-dim); opacity:.55; }
  .graf-fill-real{ background:var(--teal); }
  .graf-value{ width:56px; flex-shrink:0; text-align:right; font-size:13px; font-weight:800; color:var(--text); }

  .footer-note{ text-align:center; color:var(--text-dim); font-size:11px; margin-top:18px; }

  @media(max-width:640px){
    .slide{ padding:14px 12px; }
  }
</style>
</head>
<body>
<div class="topbar">
  <div class="brand-title"><span class="live-dot"></span>CAJA LOS ANDES · CICLORECREOVÍA</div>
  <div class="brand-sub">INFORME</div>
  <div class="topbar-actions">
    <div class="filtro-wrap">
      <button class="filtro-btn" id="filtroBtn" onclick="toggleFiltro()">Buscar</button>
      <div class="filtro-panel" id="filtroPanel"></div>
    </div>
    <a class="filtro-btn" href="https://adobe.ly/4eWdU1z" target="_blank" rel="noopener noreferrer">Fotos</a>
    <a class="filtro-btn" href="https://docs.google.com/spreadsheets/d/1Pecyuoo3t4elDs1TcoAN6V5mbA1nntpuFb_XFBFpRJk/edit?usp=sharing" target="_blank" rel="noopener noreferrer">BBDD</a>
  </div>
</div>
<div class="status" id="statusLine"></div>

<main id="main">
  <div id="content"></div>
  <div class="footer-note">CicloRecreoVía · Informe generado automáticamente desde la planilla de registro</div>
</main>

<script>
  // TODO: reemplazar con la URL de implementación de Apps Script (Code.gs)
  const CSV_URL = "https://script.google.com/macros/s/AKfycbySvS6SJrVRxTS3lk7wTVmO0zl1wrJVDzmj81V2Ukxk9UskSQ0UG-wlbR2DnJae0dxR/exec";

  const VARS = [
    { key:'totales', label:'Transacciones totales', icon:'total' },
    { key:'kits', label:'Kits Agua + Fruta', icon:'kit' },
    { key:'mecanica', label:'Mecánica', icon:'wrench' },
    { key:'bicicletas', label:'Bicicletas', icon:'bike' },
    { key:'providencia', label:'Providencia', icon:'pin' },
    { key:'nunoa', label:'Ñuñoa', icon:'pin' },
    { key:'afiliados', label:'Afiliados', icon:'badge' },
    { key:'noAfiliados', label:'No afiliados que consultaron', icon:'question' },
  ];

  const ICONS = {
    total: '<svg viewBox="0 0 24 24" fill="none" stroke="#f97316" stroke-width="2"><path d="M3 12h4l3 8 4-16 3 8h4"/></svg>',
    kit: '<svg viewBox="0 0 24 24" fill="none" stroke="#00d4aa" stroke-width="2"><path d="M12 2v6M8 8h8l1 12H7L8 8z"/></svg>',
    wrench: '<svg viewBox="0 0 24 24" fill="none" stroke="#00d4aa" stroke-width="2"><path d="M14.7 6.3a4 4 0 0 1-5.4 5.4L4 17v3h3l5.3-5.3a4 4 0 0 1 5.4-5.4l-3 3-2-2 3-3z"/></svg>',
    bike: '<svg viewBox="0 0 24 24" fill="none" stroke="#00d4aa" stroke-width="2"><circle cx="6" cy="17" r="3"/><circle cx="18" cy="17" r="3"/><path d="M6 17l4-9h4l3 9M10 8h4M12 17h6"/></svg>',
    pin: '<svg viewBox="0 0 24 24" fill="none" stroke="#f97316" stroke-width="2"><path d="M12 22s7-6.5 7-12a7 7 0 1 0-14 0c0 5.5 7 12 7 12z"/><circle cx="12" cy="10" r="2.5"/></svg>',
    badge: '<svg viewBox="0 0 24 24" fill="none" stroke="#00d4aa" stroke-width="2"><circle cx="12" cy="8" r="4"/><path d="M8 12l-2 8 6-3 6 3-2-8"/></svg>',
    question: '<svg viewBox="0 0 24 24" fill="none" stroke="#8b949e" stroke-width="2"><circle cx="12" cy="12" r="9"/><path d="M9.5 9a2.5 2.5 0 0 1 5 0c0 1.5-2.5 2-2.5 3.5M12 17h.01"/></svg>',
  };

  const MESES = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];

  let registros = []; // orden cronológico ascendente

  // ---------- CSV parsing (con soporte para comillas / comas embebidas) ----------
  function parseCSV(text){
    const rows = [];
    let row = [], field = '', inQuotes = false;
    for (let i=0; i<text.length; i++){
      const c = text[i], next = text[i+1];
      if (inQuotes){
        if (c === '"' && next === '"'){ field += '"'; i++; }
        else if (c === '"'){ inQuotes = false; }
        else field += c;
      } else {
        if (c === '"') inQuotes = true;
        else if (c === ','){ row.push(field); field=''; }
        else if (c === '\n'){ row.push(field); rows.push(row); row=[]; field=''; }
        else if (c === '\r'){ /* skip */ }
        else field += c;
      }
    }
    if (field.length || row.length){ row.push(field); rows.push(row); }
    return rows.filter(r => r.length && r.some(c => c !== ''));
  }

  function toNum(v){ const n = parseFloat(v); return isNaN(n) ? 0 : n; }
  function fechaBonita(fechaStr){
    const d = new Date(fechaStr + 'T00:00:00');
    return `${d.getDate()} de ${MESES[d.getMonth()].toLowerCase()} de ${d.getFullYear()}`;
  }
  function mesesDisponibles(){
    // 12 meses del proyecto, desde julio 2026
    const arr = [];
    let y = 2026, m = 6; // julio = index 6
    for (let i=0;i<12;i++){
      arr.push({ y, m, key:`${y}-${String(m+1).padStart(2,'0')}`, label:`${MESES[m]} ${y}` });
      m++; if (m>11){ m=0; y++; }
    }
    return arr;
  }

  async function cargarDatos(manual){
    const statusLine = document.getElementById('statusLine');
    if (CSV_URL.indexOf('PENDIENTE') === 0){
      statusLine.textContent = 'Falta conectar CSV_URL en el código con la URL de Apps Script.';
      renderTodo();
      return;
    }
    try {
      statusLine.textContent = manual ? 'Actualizando…' : 'Cargando datos…';
      const res = await fetch(CSV_URL + '?t=' + Date.now());
      const text = await res.text();
      const rows = parseCSV(text);
      const headers = rows[0];
      const data = rows.slice(1).map(r => {
        const o = {};
        headers.forEach((h,i) => o[h.trim()] = r[i] !== undefined ? r[i] : '');
        return o;
      });
      registros = data.map(r => ({
        fecha: r.fecha_domingo,
        totales: toNum(r.transacciones_totales),
        kits: toNum(r.kits_agua_fruta),
        mecanica: toNum(r.mecanica),
        bicicletas: toNum(r.bicicletas),
        providencia: toNum(r.providencia),
        nunoa: toNum(r.nunoa),
        afiliados: toNum(r.afiliados),
        noAfiliados: toNum(r.no_afiliados),
        foto1: r.foto1_url,
      })).filter(r => r.fecha).sort((a,b) => a.fecha.localeCompare(b.fecha));

      statusLine.textContent = registros.length ? '' : 'Sin registros todavía.';

      construirFiltro();
    } catch(err){
      statusLine.textContent = 'Error cargando datos: ' + err.message;
      return;
    }
    try {
      renderTodo();
    } catch(err){
      console.error('Error al renderizar (probablemente el gráfico):', err);
    }
  }

  // ---------- Piezas reutilizables ----------
  function statCardsHTML(vals, heroKey){
    const hero = VARS.find(v => v.key === heroKey);
    const resto = VARS.filter(v => v.key !== heroKey);
    let html = `
      <div class="hero-number">
        <div class="num">${vals[heroKey].toLocaleString('es-CL')}</div>
        <div class="lbl">${hero.label}</div>
      </div>
      <div class="stat-grid">`;
    resto.forEach(v => {
      const isTeal = ['kits','mecanica','bicicletas','afiliados'].includes(v.key);
      html += `
        <div class="stat-card ${isTeal ? 'teal':'orange'}">
          ${ICONS[v.icon]}
          <div class="val">${vals[v.key].toLocaleString('es-CL')}</div>
          <div class="lbl">${v.label}</div>
        </div>`;
    });
    html += `</div>`;
    return html;
  }

  function splitBarHTML(vals){
    const p = vals.providencia, n = vals.nunoa, tot = (p+n) || 1;
    return `
      <div class="split-row">
        <div class="split-bar">
          <div class="top"><span>Providencia</span><span style="color:var(--orange)">${p.toLocaleString('es-CL')}</span></div>
          <div class="split-track"><div class="split-fill-p" style="width:${(p/tot*100)}%"></div></div>
        </div>
        <div class="split-bar">
          <div class="top"><span>Ñuñoa</span><span style="color:var(--teal)">${n.toLocaleString('es-CL')}</span></div>
          <div class="split-track"><div class="split-fill-n" style="width:${(n/tot*100)}%"></div></div>
        </div>
      </div>`;
  }

  function bloqueVariablesHTML(vals, n, tituloGrande, subtitulo, ocultarPromedios){
    const avg = (x) => (n ? (x / n) : 0).toLocaleString('es-CL', { maximumFractionDigits: 0 });
    const avgHTML = (x) => ocultarPromedios ? '' : `<div class="trio-avg">${avg(x)} prom.</div>`;
    const avgServiceHTML = (x) => ocultarPromedios ? '' : `<div class="s-avg">${avg(x)} prom.</div>`;
    const avgAfHTML = (x) => ocultarPromedios ? '' : `<div class="af-avg">${avg(x)} prom.</div>`;
    return `
      <div class="total-label">${tituloGrande}</div>
      <div class="total-sub">${subtitulo}</div>

      <div class="group-title">TRANSACCIONES</div>
      <div class="trio-grid">
        <div class="trio-box trio-box-invert">
          <div class="trio-label">Total</div>
          <div class="trio-value">${vals.totales.toLocaleString('es-CL')}</div>
          ${avgHTML(vals.totales)}
        </div>
        <div class="trio-box">
          <div class="trio-label">Providencia</div>
          <div class="trio-value">${vals.providencia.toLocaleString('es-CL')}</div>
          ${avgHTML(vals.providencia)}
        </div>
        <div class="trio-box">
          <div class="trio-label">Ñuñoa</div>
          <div class="trio-value">${vals.nunoa.toLocaleString('es-CL')}</div>
          ${avgHTML(vals.nunoa)}
        </div>
      </div>

      <div class="service-grid">
        <div class="service-box">
          <div class="s-label">Kit Agua-Fruta</div>
          <div class="s-total">${vals.kits.toLocaleString('es-CL')}</div>
          ${avgServiceHTML(vals.kits)}
        </div>
        <div class="service-box">
          <div class="s-label">Bicicleta</div>
          <div class="s-total">${vals.bicicletas.toLocaleString('es-CL')}</div>
          ${avgServiceHTML(vals.bicicletas)}
        </div>
        <div class="service-box">
          <div class="s-label">Mecánica</div>
          <div class="s-total">${vals.mecanica.toLocaleString('es-CL')}</div>
          ${avgServiceHTML(vals.mecanica)}
        </div>
      </div>

      <div class="group-title">AFILIACIÓN</div>
      <div class="afiliados-row">
        <div class="af-col af-col-left">
          <div class="af-label">Afiliados</div>
          <div class="af-main">${vals.afiliados.toLocaleString('es-CL')}</div>
          ${avgAfHTML(vals.afiliados)}
        </div>
        <div class="af-col af-col-right">
          <div class="af-label">NO Afiliados</div>
          <div class="af-secondary">${vals.noAfiliados.toLocaleString('es-CL')}</div>
        </div>
      </div>
    `;
  }

  function graficoBarrasHTML(titulo, meta, real){
    const max = Math.max(meta, real, 1);
    const pctMeta = Math.max((meta / max) * 100, 2);
    const pctReal = Math.max((real / max) * 100, 2);
    const diffPct = meta ? ((real - meta) / meta) * 100 : 0;
    const signo = diffPct >= 0 ? '+' : '';
    const claseDiff = diffPct >= 0 ? 'pos' : 'neg';
    return `
      <div class="graf-block">
        <div class="graf-title">${titulo} <span class="graf-pct ${claseDiff}">(${signo}${diffPct.toLocaleString('es-CL', {maximumFractionDigits:1})}%)</span></div>
        <div class="graf-row">
          <div class="graf-label">Meta</div>
          <div class="graf-track"><div class="graf-fill graf-fill-meta" style="width:${pctMeta}%"></div></div>
          <div class="graf-value">${meta.toLocaleString('es-CL')}</div>
        </div>
        <div class="graf-row">
          <div class="graf-label graf-label-real">Real</div>
          <div class="graf-track"><div class="graf-fill graf-fill-real" style="width:${pctReal}%"></div></div>
          <div class="graf-value">${real.toLocaleString('es-CL')}</div>
        </div>
      </div>
    `;
  }

  function photosHTML(r){
    return r.foto1
      ? `<div class="photo-box"><img src="${r.foto1}" alt="Foto jornada ${r.fecha}" loading="lazy"></div>`
      : `<div class="photo-box"><div class="empty">Sin foto para esta fecha</div></div>`;
  }

  // ---------- Render de la página completa ----------
  function renderTodo(){
    const content = document.getElementById('content');

    if (!registros.length){
      content.innerHTML = `
        <div class="empty-state">
          <div class="big">📭</div>
          <div>Todavía no hay domingos registrados en la planilla.<br>Apenas se ingrese el primero, aparecerá aquí automáticamente.</div>
        </div>`;
      return;
    }

    // --- Consolidado ---
    const totalVals = {};
    VARS.forEach(v => totalVals[v.key] = registros.reduce((s,r) => s + r[v.key], 0));

    const metaTotales = 806 * registros.length;
    const metaKits = 560 * registros.length;

    let html = `
      <div class="slide" id="anchor-todas">
        ${bloqueVariablesHTML(totalVals, registros.length, 'TOTAL HASTA AHORA', `${registros.length} de 52 domingos`)}
        ${graficoBarrasHTML('Transacciones TOTALES', metaTotales, totalVals.totales)}
        ${graficoBarrasHTML('Transacciones KITS', metaKits, totalVals.kits)}
      </div>
    `;

    // --- Meses (solo los que tengan al menos un domingo registrado) ---
    mesesDisponibles().forEach(mes => {
      const delMes = registros.filter(r => r.fecha.slice(0,7) === mes.key);
      if (!delMes.length) return;
      const v = {};
      VARS.forEach(x => v[x.key] = delMes.reduce((s,r) => s + r[x.key], 0));
      html += `
        <div class="slide" id="anchor-mes-${mes.key}">
          ${bloqueVariablesHTML(v, delMes.length, mes.label, `${delMes.length} domingo(s) registrado(s)`)}
        </div>`;
    });

    // --- Domingos (orden cronológico ascendente) ---
    registros.forEach(r => {
      const semana = registros.findIndex(x => x.fecha === r.fecha) + 1;
      html += `
        <div class="slide" id="anchor-fecha-${r.fecha}">
          ${bloqueVariablesHTML(r, 1, fechaBonita(r.fecha), `Domingo ${semana} de 52`, true)}
          ${photosHTML(r)}
        </div>`;
    });

    content.innerHTML = html;
  }

  // ---------- Filtro = salto rápido ----------
  function crearOpcion(texto, idDestino){
    const btn = document.createElement('button');
    btn.className = 'filtro-opt';
    btn.textContent = texto;
    btn.addEventListener('click', () => { irA(idDestino); toggleFiltro(false); });
    return btn;
  }

  function construirFiltro(){
    const panel = document.getElementById('filtroPanel');
    panel.innerHTML = '';

    panel.appendChild(crearOpcion('Total todas las jornadas', 'anchor-todas'));

    const meses = mesesDisponibles().filter(mes => registros.some(r => r.fecha.slice(0,7) === mes.key));
    if (meses.length){
      const lbl = document.createElement('div');
      lbl.className = 'filtro-group-label';
      lbl.textContent = 'Meses';
      panel.appendChild(lbl);
      meses.forEach(mes => {
        panel.appendChild(crearOpcion(mes.label, `anchor-mes-${mes.key}`));
      });
    }

    if (registros.length){
      const lbl = document.createElement('div');
      lbl.className = 'filtro-group-label';
      lbl.textContent = 'Domingos';
      panel.appendChild(lbl);
      [...registros].reverse().forEach(r => {
        panel.appendChild(crearOpcion(fechaBonita(r.fecha), `anchor-fecha-${r.fecha}`));
      });
    }

    console.log('Filtro construido:', 1 + meses.length + registros.length, 'opciones (meses:', meses.length, ', domingos:', registros.length, ')');
  }

  function toggleFiltro(forzar){
    const panel = document.getElementById('filtroPanel');
    const abrir = forzar !== undefined ? forzar : !panel.classList.contains('open');
    if (abrir){
      const rect = document.getElementById('filtroBtn').getBoundingClientRect();
      panel.style.top = (rect.bottom + 8) + 'px';
    }
    panel.classList.toggle('open', abrir);
  }

  document.addEventListener('click', (e) => {
    const wrap = document.querySelector('.filtro-wrap');
    if (wrap && !wrap.contains(e.target)) toggleFiltro(false);
  });

  function irA(id){
    const el = document.getElementById(id);
    if (!el) return;
    el.scrollIntoView({ behavior:'smooth', block:'start' });
    el.classList.add('highlight');
    setTimeout(() => el.classList.remove('highlight'), 1600);
  }

  cargarDatos();
  setInterval(() => cargarDatos(false), 60000); // auto-refresh cada 60s
</script>
</body>
</html>
