<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fotos del Domingo · Caja Los Andes CRV</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0d1117; --bg-card:#161b22; --border:#21262d;
    --text:#e6edf3; --text-dim:#8b949e;
    --orange:#f97316; --teal:#00d4aa;
  }
  *{box-sizing:border-box;}
  body{
    margin:0; font-family:'Nunito',sans-serif; background:var(--bg); color:var(--text);
    min-height:100vh; display:flex; align-items:center; justify-content:center; padding:24px;
  }
  .card{
    width:100%; max-width:460px; background:var(--bg-card); border:1px solid var(--border);
    border-radius:20px; padding:28px 24px 32px;
  }
  .eyebrow{ color:var(--orange); font-weight:800; font-size:12px; letter-spacing:1.5px; text-transform:uppercase; }
  h1{ font-size:20px; font-weight:900; margin:6px 0 4px; line-height:1.25; }
  .sub{ color:var(--text-dim); font-size:13px; margin-bottom:22px; line-height:1.5; }
  label{ display:block; font-size:13px; font-weight:700; color:var(--text-dim); margin:16px 0 6px; }
  input[type=date], input[type=url]{
    width:100%; background:#0d1117; border:1.5px solid var(--border); color:var(--text);
    border-radius:10px; padding:12px 14px; font-family:'Nunito',sans-serif; font-size:15px; font-weight:700;
  }
  input:focus{ outline:none; border-color:var(--teal); }
  .hint{ font-size:11px; color:var(--text-dim); margin-top:4px; }
  .ok{ color:var(--teal); } .warn{ color:var(--orange); }
  button{
    width:100%; margin-top:24px; padding:15px; border:none; border-radius:12px;
    background:linear-gradient(135deg, var(--orange), #ea580c); color:#fff;
    font-family:'Nunito',sans-serif; font-weight:900; font-size:15px; cursor:pointer;
  }
  button:disabled{ opacity:.5; cursor:not-allowed; }
  .msg{ margin-top:16px; padding:13px; border-radius:10px; font-size:13px; font-weight:700; text-align:center; display:none; }
  .msg.ok{ background:rgba(0,212,170,.12); border:1px solid var(--teal); color:var(--teal); display:block; }
  .msg.err{ background:rgba(249,115,22,.12); border:1px solid var(--orange); color:var(--orange); display:block; }
</style>
</head>
<body>
<div class="card">
  <div class="eyebrow">Caja Los Andes · CicloRecreoVía</div>
  <h1>Fotos del domingo</h1>
  <div class="sub">Las 8 variables se calculan solas desde los registros de la estación. Esto es solo para dejar 1-2 fotos de esa jornada. Puedes reenviar este formulario con la misma fecha para reemplazar las fotos ya guardadas.</div>

  <label>Domingo correspondiente</label>
  <input type="date" id="fecha" required>
  <div class="hint" id="fechaHint"></div>

  <label>URL Foto 1</label>
  <input type="url" id="foto1" placeholder="https://...">

  <label>URL Foto 2 (opcional)</label>
  <input type="url" id="foto2" placeholder="https://...">

  <button id="btnEnviar" onclick="enviar()">Guardar fotos de este domingo</button>
  <div class="msg" id="msg"></div>
</div>

<script>
  // TODO: reemplazar con la URL de implementación de Apps Script (Code.gs)
  const ENDPOINT_URL = "https://script.google.com/macros/s/AKfycbySvS6SJrVRxTS3lk7wTVmO0zl1wrJVDzmj81V2Ukxk9UskSQ0UG-wlbR2DnJae0dxR/exec";

  function domingoMasReciente(){
    const d = new Date();
    d.setDate(d.getDate() - d.getDay()); // 0 = domingo
    return d.toISOString().split('T')[0];
  }
  const fechaInput = document.getElementById('fecha');
  fechaInput.value = domingoMasReciente();

  function actualizarHint(){
    const d = new Date(fechaInput.value + 'T00:00:00');
    document.getElementById('fechaHint').innerHTML = d.getDay() === 0
      ? '<span class="ok">✓ Es domingo</span>'
      : '<span class="warn">⚠ Esta fecha no es domingo, revisa antes de enviar</span>';
  }
  fechaInput.addEventListener('change', actualizarHint);
  actualizarHint();

  async function enviar(){
    const btn = document.getElementById('btnEnviar');
    const msg = document.getElementById('msg');
    msg.className = 'msg'; msg.style.display = 'none';

    if (!fechaInput.value){ msg.className='msg err'; msg.textContent='Selecciona la fecha del domingo.'; return; }
    if (ENDPOINT_URL.indexOf('PENDIENTE') === 0){ msg.className='msg err'; msg.textContent='Falta conectar ENDPOINT_URL en el código.'; return; }

    const payload = {
      fecha: fechaInput.value,
      foto1: document.getElementById('foto1').value,
      foto2: document.getElementById('foto2').value
    };

    btn.disabled = true; btn.textContent = 'Guardando...';
    try {
      const res = await fetch(ENDPOINT_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'text/plain' }, // evita preflight CORS con Apps Script
        body: JSON.stringify(payload)
      });
      const data = await res.json();
      if (data.status === 'ok'){
        msg.className = 'msg ok';
        msg.textContent = data.action === 'actualizado'
          ? '✓ Fotos actualizadas para el ' + payload.fecha
          : '✓ Fotos guardadas para el ' + payload.fecha;
      } else {
        msg.className = 'msg err'; msg.textContent = 'Error: ' + (data.message || 'desconocido');
      }
    } catch(err){
      msg.className = 'msg err'; msg.textContent = 'Error de conexión: ' + err.message;
    } finally {
      btn.disabled = false; btn.textContent = 'Guardar fotos de este domingo';
    }
  }
</script>
</body>
</html>
